<!DOCTYPE html>
<html>
<head>

<title>Doctor Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<a href="index.html" class="btn btn-secondary mb-3">
Back
</a>

<h3 id="doctorName"></h3>

<div class="row" id="appointments"></div>

</div>

<script>

const doctor=localStorage.getItem("loggedDoctor")

document.getElementById("doctorName").innerText=
"Welcome "+doctor

let appointments=
JSON.parse(localStorage.getItem("appointments"))||[]

const list=document.getElementById("appointments")


function display(){

appointments=
JSON.parse(localStorage.getItem("appointments"))||[]

list.innerHTML=""

appointments
.filter(app=>app.doctor===doctor)
.forEach(app=>{

list.innerHTML+=`

<div class="col-md-6 mb-4">

<div class="card p-3 shadow">

<h5>${app.name}</h5>

<p>${app.date} | ${app.time}</p>

<p>Status: ${app.status}</p>

<textarea id="note${app.id}" class="form-control mb-2"
placeholder="Cancellation note"></textarea>

<button class="btn btn-success btn-sm me-2"
onclick="update(${app.id},'Confirmed')">
Confirm
</button>

<button class="btn btn-danger btn-sm"
onclick="cancelAppointment(${app.id})">
Cancel
</button>

<button class="btn btn-warning btn-sm mt-2"
onclick="leave(${app.id})">
Doctor Leave
</button>

</div>

</div>

`

})

}


function update(id,status){

appointments=appointments.map(app=>{

if(app.id===id){
app.status=status
}

return app

})

localStorage.setItem("appointments",JSON.stringify(appointments))

display()

}


function cancelAppointment(id){

let note=document.getElementById("note"+id).value

appointments=appointments.map(app=>{

if(app.id===id){

app.status="Cancelled"
app.note=note

}

return app

})

localStorage.setItem("appointments",JSON.stringify(appointments))

display()

}


function leave(id){

appointments=appointments.map(app=>{

if(app.id===id){

app.leave=true
app.status="Cancelled"

}

return app

})

localStorage.setItem("appointments",JSON.stringify(appointments))

display()

}

display()

</script>

</body>
</html>
