<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Clinic Appointment System</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#1f2937,#111827);
color:white;
font-family:Segoe UI;
}

.navbar{
background:linear-gradient(90deg,#6a11cb,#2575fc);
}

.card{
border:none;
border-radius:15px;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

.badge-confirmed{background:#22c55e}
.badge-pending{background:#facc15;color:black}
.badge-cancelled{background:#ef4444}
.badge-leave{background:#6366f1}

button:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<nav class="navbar navbar-dark">
<div class="container">

<h4>🏥 Luxury Clinic Appointment</h4>

<a href="doctor-login.html" class="btn btn-light">
Doctor Login
</a>

</div>
</nav>


<div class="container mt-5">

<div class="card p-4 shadow text-dark">

<h3 class="mb-3">Book Appointment</h3>

<form id="appointmentForm">

<input type="text" id="name" class="form-control mb-3" placeholder="Patient Name" required>

<input type="email" id="email" class="form-control mb-3" placeholder="Email" required>

<select id="doctor" class="form-select mb-3" required>

<option value="">Select Doctor</option>
<option>Dr. Smith - Cardiologist</option>
<option>Dr. John - Dentist</option>
<option>Dr. Priya - Dermatologist</option>
<option>Dr. Kumar - General Physician</option>

</select>

<input type="date" id="date" class="form-control mb-3" required>

<div class="row mb-3">

<div class="col">
<select id="hour" class="form-select">
<option>1</option><option>2</option><option>3</option>
<option>4</option><option>5</option><option>6</option>
<option>7</option><option>8</option><option>9</option>
<option>10</option><option>11</option><option>12</option>
</select>
</div>

<div class="col">
<select id="minute" class="form-select">
<option>00</option><option>15</option>
<option>30</option><option>45</option>
</select>
</div>

<div class="col">
<select id="ampm" class="form-select">
<option>AM</option>
<option>PM</option>
</select>
</div>

</div>

<button class="btn btn-primary w-100">
Schedule Appointment
</button>

</form>

</div>


<h3 class="mt-5">Appointments</h3>

<div class="row" id="appointmentList"></div>

</div>


<script>

let appointments=
JSON.parse(localStorage.getItem("appointments"))||[]

const form=document.getElementById("appointmentForm")
const list=document.getElementById("appointmentList")

form.addEventListener("submit",function(e){

e.preventDefault()

let hour=hour.value
let minute=minute.value
let ampm=ampm.value

let time=hour+":"+minute+" "+ampm

const appointment={

id:Date.now(),

name:name.value,
email:email.value,
doctor:doctor.value,
date:date.value,
time:time,

status:"Pending",
note:"",
leave:false

}

appointments.push(appointment)

localStorage.setItem("appointments",JSON.stringify(appointments))

form.reset()

display()

})


function deleteAppointment(id){

appointments=appointments.filter(a=>a.id!==id)

localStorage.setItem("appointments",JSON.stringify(appointments))

display()

}


function display(){

appointments=
JSON.parse(localStorage.getItem("appointments"))||[]

list.innerHTML=""

appointments.forEach(app=>{

let badge="badge-pending"

if(app.status==="Confirmed") badge="badge-confirmed"
if(app.status==="Cancelled") badge="badge-cancelled"

if(app.leave===true) badge="badge-leave"

list.innerHTML+=`

<div class="col-md-6 mb-4">

<div class="card p-3 text-dark">

<h5>${app.name}</h5>

<p><b>Doctor:</b> ${app.doctor}</p>

<p><b>Date:</b> ${app.date}</p>

<p><b>Time:</b> ${app.time}</p>

<span class="badge ${badge}">
${app.leave ? "Doctor On Leave" : app.status}
</span>

${app.note ? `<p class="text-danger mt-2"><b>Note:</b> ${app.note}</p>` : ""}

<button class="btn btn-danger btn-sm mt-2"
onclick="deleteAppointment(${app.id})">
Delete
</button>

</div>

</div>

`

})

}

display()

</script>

</body>
</html>
