<!DOCTYPE html>
<html>
<head>

<title>Doctor Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
border-radius:15px;
transition:0.3s;
}

.card:hover{
transform:scale(1.02);
}

</style>

</head>

<body>

<div class="card p-4 shadow" style="width:350px">

<h3 class="text-center mb-3">Doctor Login</h3>

<select id="doctor" class="form-select mb-3">

<option>Dr. Smith - Cardiologist</option>
<option>Dr. John - Dentist</option>
<option>Dr. Priya - Dermatologist</option>
<option>Dr. Kumar - General Physician</option>

</select>

<input type="password"
id="password"
class="form-control mb-3"
placeholder="Password">

<button
class="btn btn-primary w-100 mb-2"
onclick="login()">
Login
</button>

<a href="index.html" class="btn btn-secondary w-100">
Back to Home
</a>

</div>


<script>

const doctors={

"Dr. Smith - Cardiologist":"123",
"Dr. John - Dentist":"123",
"Dr. Priya - Dermatologist":"123",
"Dr. Kumar - General Physician":"123"

}

function login(){

let doctorName=document.getElementById("doctor").value
let password=document.getElementById("password").value

if(doctors[doctorName]===password){

localStorage.setItem("loggedDoctor",doctorName)

window.location.href="doctor-dashboard.html"

}else{

alert("Invalid Login")

}

}

</script>

</body>
</html>
